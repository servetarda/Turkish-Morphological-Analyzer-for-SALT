<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Morphological Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Turkish Morphological Analyzer</h1>
            <p>Inline SALT format morphological breakdown</p>
        </header>

        <main>
            <section class="input-section">
                <textarea id="textInput" placeholder="Paste your text here...
Example:
$ Ben bugün çok yoruldum"></textarea>
                <div class="actions">
                    <button id="analyzeBtn" class="primary-btn">Analyze Text</button>
                </div>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h2>Annotated Output</h2>
                    <button id="copyBtn" class="secondary-btn">Copy to Clipboard</button>
                </div>
                <textarea id="resultsText" readonly></textarea>
            </section>
        </main>
    </div>

    <!-- Load the JS files -->
    <script src="lexicon.js"></script>
    <script src="analyzer.js"></script>
</body>
</html>
